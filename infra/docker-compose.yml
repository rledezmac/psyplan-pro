version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: psyplan
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: psyplan_db
    ports: ["5432:5432"]
    volumes: ["pg/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

volumes:
  pg